## 개발 환경 전체 실행용 (DB + Redis + Backend + Frontend)
## 사용법:
##   docker compose -f docker-compose-dev.yml up --build
##   docker compose -f docker-compose-dev.yml down -v   # 볼륨 포함 정리
##
## Podman 사용 시:
##   podman compose -f docker-compose-dev.yml up --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-dev-postgres
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rag-dev-redis
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: rag-dev-backend
    ports:
      - "8080:8080"
    environment:
      # DB — 컨테이너 네트워크에서는 서비스명으로 접근
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ragdb
      SPRING_DATASOURCE_USERNAME: raguser
      SPRING_DATASOURCE_PASSWORD: ragpass
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # AI — Ollama는 호스트에서 실행 중이라고 가정
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      APP_MODEL_OLLAMA_DEFAULT_BASE_URL: http://host.docker.internal:11434
      # API Keys (호스트의 환경변수에서 주입)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-spring-rag-app-dev-secret-key-minimum-32-chars}
      # 파일 업로드
      AVATAR_UPLOAD_DIR: /app/uploads/avatars
      DOCUMENT_UPLOAD_DIR: /app/uploads/documents
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    container_name: rag-dev-frontend
    ports:
      - "5173:5173"
    environment:
      # Vite proxy 대상을 backend 컨테이너로 변경
      VITE_API_BASE: http://backend:8080
    volumes:
      # 소스 바인드 마운트 — 핫 리로드 지원
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
