spring:
  application:
    name: spring-rag-application

  datasource:
    url: jdbc:postgresql://localhost:5434/ragdb
    username: raguser
    password: ragpass

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        enabled: false
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gpt-oss:20b
          temperature: 0.3
      embedding:
        options:
          model: qwen3-embedding:4b

  data:
    redis:
      host: localhost
      port: 6381

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  chunking:
    mode: semantic                # "fixed" 또는 "semantic"
    fixed:
      chunk-size: 1000
      overlap: 200
    semantic:
      buffer-size: 1
      breakpoint-percentile: 90
      min-chunk-size: 200
      max-chunk-size: 1500
  conversation:
    max-messages: 20
    ttl-minutes: 60
  search:
    expansion-count: 3
    rerank-candidates: 15
  rag:
    max-sub-queries: 3
    merge-analysis: true
  evaluation:
    sample-rate: 0.1
  guard:
    rate-limit-per-minute: 10
    max-input-length: 2000
  jwt:
    secret: ${JWT_SECRET:spring-rag-app-dev-secret-key-minimum-32-chars}
    access-token-expiry: 1800000
    refresh-token-expiry: 604800000
  model:
    ollama:
      default-base-url: http://localhost:11434

logging:
  level:
    pipeline.trace: INFO
    evaluation: INFO

server:
  port: 8080
