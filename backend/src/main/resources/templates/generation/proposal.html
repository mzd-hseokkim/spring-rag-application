<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${outline.title()}">문서 제목</title>
    <style>
        /* ── CSS Variables (향후 테마 확장용) ── */
        :root {
            --color-primary: #1e3a5f;
            --color-primary-light: #2a5a8f;
            --color-accent: #3b82f6;
            --color-accent-light: #eff6ff;
            --color-text: #1f2937;
            --color-text-secondary: #6b7280;
            --color-border: #e5e7eb;
            --color-bg: #ffffff;
            --color-bg-subtle: #f9fafb;
            --color-highlight-bg: #f0f9ff;
            --color-highlight-border: #bae6fd;
            --font-sans: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --radius: 8px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            color: var(--color-text);
            background: var(--color-bg);
            line-height: 1.8;
            font-size: 15px;
            max-width: 80%;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* ── Cover Page ── */
        .cover-page {
            text-align: center;
            padding: 80px 40px;
            margin-bottom: 48px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: #ffffff;
            border-radius: var(--radius);
        }
        .cover-page h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        .cover-page .summary {
            font-size: 1.05rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 24px;
            line-height: 1.7;
        }
        .cover-page .date {
            font-size: 0.9rem;
            opacity: 0.7;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 20px;
            display: inline-block;
        }

        /* ── Table of Contents ── */
        .toc {
            background: var(--color-bg-subtle);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 48px;
        }
        .toc h2 {
            font-size: 1.1rem;
            color: var(--color-primary);
            margin-bottom: 16px;
            font-weight: 600;
        }
        .toc ol {
            counter-reset: toc-counter;
            list-style: none;
        }
        .toc ol li {
            counter-increment: toc-counter;
            padding: 6px 0;
            border-bottom: 1px solid var(--color-border);
        }
        .toc ol li:last-child { border-bottom: none; }
        .toc ol li::before {
            content: counter(toc-counter) ".";
            color: var(--color-accent);
            font-weight: 600;
            margin-right: 8px;
        }
        .toc a {
            color: var(--color-text);
            text-decoration: none;
        }
        .toc a:hover { color: var(--color-accent); }

        /* ── Sections ── */
        .section {
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--color-border);
        }
        .section:last-of-type { border-bottom: none; }
        .section h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 3px solid var(--color-accent);
            display: inline-block;
        }

        /* ── Section Body (Markdown rendered) ── */
        .section-body h3 { font-size: 1.15rem; font-weight: 600; margin: 24px 0 10px; color: var(--color-primary-light); }
        .section-body h4 { font-size: 1.05rem; font-weight: 600; margin: 20px 0 8px; }
        .section-body p { margin-bottom: 14px; }
        .section-body ul, .section-body ol { margin: 10px 0 14px 24px; }
        .section-body li { margin-bottom: 4px; }
        .section-body code {
            background: var(--color-bg-subtle);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.9em;
        }
        .section-body pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px 20px;
            border-radius: var(--radius);
            overflow-x: auto;
            margin: 16px 0;
        }
        .section-body pre code { background: none; color: inherit; padding: 0; }
        .section-body blockquote {
            border-left: 4px solid var(--color-accent);
            padding: 12px 20px;
            margin: 16px 0;
            background: var(--color-accent-light);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        /* ── Highlights ── */
        .highlights {
            background: var(--color-highlight-bg);
            border: 1px solid var(--color-highlight-border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-top: 20px;
        }
        .highlights h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: 10px;
        }
        .highlights ul { list-style: none; }
        .highlights li {
            padding: 4px 0 4px 20px;
            position: relative;
        }
        .highlights li::before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--color-accent);
            font-weight: 700;
        }

        /* ── Tables ── */
        .data-table { margin: 20px 0; overflow-x: auto; }
        .data-table caption {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
            text-align: left;
            font-style: italic;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        thead { background: var(--color-primary); color: #ffffff; }
        th {
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: left;
        }
        td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.9rem;
        }
        tbody tr:nth-child(even) { background: var(--color-bg-subtle); }
        tbody tr:hover { background: var(--color-accent-light); }

        /* ── References ── */
        .references {
            background: var(--color-bg-subtle);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-top: 48px;
        }
        .references h2 {
            font-size: 1.1rem;
            color: var(--color-primary);
            margin-bottom: 12px;
            font-weight: 600;
        }
        .references ul { list-style: decimal; padding-left: 20px; }
        .references li {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            padding: 3px 0;
        }

        /* ── Layout: COMPARE_2COL ── */
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin: 20px 0;
        }
        .compare-col {
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--color-border);
        }
        .compare-left { background: #fef3c7; border-color: #fbbf24; }
        .compare-right { background: #d1fae5; border-color: #34d399; }
        .compare-label {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid;
        }
        .compare-label-left { color: #b45309; border-color: #fbbf24; }
        .compare-label-right { color: #047857; border-color: #34d399; }

        /* ── Layout: PROCESS_HORIZONTAL ── */
        .process-flow {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 24px 0;
            overflow-x: auto;
            padding: 8px 0;
        }
        .process-step {
            flex: 1;
            min-width: 120px;
            text-align: center;
            padding: 16px 12px;
            background: var(--color-accent-light);
            border-radius: var(--radius);
            border: 1px solid var(--color-border);
            position: relative;
        }
        .step-number {
            width: 32px;
            height: 32px;
            background: var(--color-accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0 auto 8px;
        }
        .step-label { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
        .step-desc { font-size: 0.8rem; color: var(--color-text-secondary); }
        .step-arrow {
            position: absolute;
            right: -18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: var(--color-accent);
            font-weight: 700;
            z-index: 1;
        }

        /* ── Layout: KPI_CARDS ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .kpi-card {
            text-align: center;
            padding: 24px 16px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
        }
        .kpi-value { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
        .kpi-label { font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; }
        .kpi-desc { font-size: 0.8rem; opacity: 0.85; }

        /* ── Layout: TEXT_IMAGE / IMAGE_FULL ── */
        .text-image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin: 16px 0;
        }
        .image-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            background: var(--color-bg-subtle);
            border: 2px dashed var(--color-border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
        }
        .image-placeholder-full { min-height: 300px; }
        .placeholder-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
        .placeholder-text {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            max-width: 300px;
            line-height: 1.5;
        }
        .image-caption {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            text-align: center;
            margin-top: 8px;
            font-style: italic;
        }

        /* ── Print / PDF ── */
        @media print {
            body { max-width: none; padding: 0; }
            .cover-page { page-break-after: always; }
            .section { page-break-inside: avoid; }
            .toc { page-break-after: always; }
        }
        @page {
            size: A4;
            margin: 2.5cm;
        }
    </style>
</head>
<body>
    <!-- 표지 -->
    <div class="cover-page">
        <h1 th:text="${outline.title()}">문서 제목</h1>
        <p class="summary" th:text="${outline.summary()}">요약</p>
        <p class="date" th:text="${#temporals.format(generatedAt, 'yyyy년 MM월 dd일')}"></p>
    </div>

    <!-- 목차 -->
    <div class="toc">
        <h2>목차</h2>
        <ol>
            <li th:each="section : ${sections}">
                <a th:text="${section.title()}" th:href="'#' + ${section.key()}"></a>
            </li>
        </ol>
    </div>

    <!-- 본문 섹션들 (레이아웃별 분기) -->
    <div th:each="section : ${sections}" class="section" th:id="${section.key()}">
        <h2 th:text="${section.title()}">섹션 제목</h2>

        <div th:if="${section.layoutType() == 'TEXT_FULL'}" th:replace="~{generation/layouts :: TEXT_FULL(${section})}"></div>
        <div th:if="${section.layoutType() == 'TEXT_TABLE'}" th:replace="~{generation/layouts :: TEXT_TABLE(${section})}"></div>
        <div th:if="${section.layoutType() == 'COMPARE_2COL'}" th:replace="~{generation/layouts :: COMPARE_2COL(${section})}"></div>
        <div th:if="${section.layoutType() == 'PROCESS_HORIZONTAL'}" th:replace="~{generation/layouts :: PROCESS_HORIZONTAL(${section})}"></div>
        <div th:if="${section.layoutType() == 'KPI_CARDS'}" th:replace="~{generation/layouts :: KPI_CARDS(${section})}"></div>
        <div th:if="${section.layoutType() == 'TABLE_FULL'}" th:replace="~{generation/layouts :: TABLE_FULL(${section})}"></div>
        <div th:if="${section.layoutType() == 'TEXT_IMAGE'}" th:replace="~{generation/layouts :: TEXT_IMAGE(${section})}"></div>
        <div th:if="${section.layoutType() == 'IMAGE_FULL'}" th:replace="~{generation/layouts :: IMAGE_FULL(${section})}"></div>
    </div>

    <!-- 참고 출처 -->
    <div th:if="${!allReferences.isEmpty()}" class="references">
        <h2>참고 자료</h2>
        <ul>
            <li th:each="ref : ${allReferences}" th:text="${ref}"></li>
        </ul>
    </div>
</body>
</html>
