<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>예상 질의서</title>
    <style>
        :root {
            --color-primary: #1e3a5f;
            --color-primary-light: #2a5a8f;
            --color-accent: #3b82f6;
            --color-accent-light: #eff6ff;
            --color-text: #1f2937;
            --color-text-secondary: #6b7280;
            --color-border: #e5e7eb;
            --color-bg: #ffffff;
            --color-bg-subtle: #f9fafb;
            --font-sans: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius: 8px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            color: var(--color-text);
            background: var(--color-bg);
            line-height: 1.8;
            font-size: 15px;
            max-width: 80%;
            margin: 0 auto;
            padding: 40px 32px;
        }

        .cover {
            text-align: center;
            padding: 60px 40px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: #ffffff;
            border-radius: var(--radius);
        }
        .cover h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .cover .meta {
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .summary-bar {
            display: flex;
            gap: 24px;
            padding: 20px 24px;
            background: var(--color-accent-light);
            border-radius: var(--radius);
            margin-bottom: 40px;
            border: 1px solid #bae6fd;
        }
        .summary-item {
            text-align: center;
        }
        .summary-item .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        .summary-item .label {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .persona-section {
            margin-bottom: 48px;
        }
        .persona-header {
            padding: 16px 20px;
            background: var(--color-bg-subtle);
            border-left: 4px solid var(--color-accent);
            border-radius: 0 var(--radius) var(--radius) 0;
            margin-bottom: 20px;
        }
        .persona-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 4px;
        }
        .persona-header .role {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        .qna-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }
        .qna-table th {
            background: var(--color-primary);
            color: #fff;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .qna-table th:first-child { border-radius: var(--radius) 0 0 0; }
        .qna-table th:last-child { border-radius: 0 var(--radius) 0 0; }
        .qna-table td {
            padding: 12px;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.9rem;
            vertical-align: top;
        }
        .qna-table tr:last-child td { border-bottom: none; }
        .qna-table tr:hover td { background: var(--color-bg-subtle); }

        .difficulty {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .difficulty-high { background: #fee2e2; color: #991b1b; }
        .difficulty-mid { background: #fef3c7; color: #92400e; }
        .difficulty-low { background: #d1fae5; color: #065f46; }

        .category-badge {
            display: inline-block;
            padding: 2px 10px;
            background: var(--color-accent-light);
            color: var(--color-accent);
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .sources {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            margin-top: 6px;
        }
        .sources span {
            display: inline-block;
            background: var(--color-bg-subtle);
            padding: 1px 6px;
            border-radius: 4px;
            margin-right: 4px;
            margin-bottom: 2px;
        }

        .footer {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid var(--color-border);
            margin-top: 48px;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        @media print {
            body { padding: 20px; font-size: 12px; }
            .cover { padding: 40px 20px; }
            .persona-section { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="cover">
    <h1>예상 질의서</h1>
    <p class="meta">
        생성일시: <span th:text="${#temporals.format(generatedAt, 'yyyy-MM-dd HH:mm')}">2026-03-23 14:00</span>
    </p>
</div>

<div class="summary-bar">
    <div class="summary-item">
        <div class="value" th:text="${totalPersonas}">4</div>
        <div class="label">페르소나</div>
    </div>
    <div class="summary-item">
        <div class="value" th:text="${totalQuestions}">32</div>
        <div class="label">총 질문 수</div>
    </div>
</div>

<div th:each="persona : ${allQna}" class="persona-section">
    <div class="persona-header">
        <h2 th:text="${persona.personaName()}">페르소나 이름</h2>
        <p class="role" th:text="${persona.personaRole()}">역할 설명</p>
    </div>

    <table class="qna-table">
        <thead>
        <tr>
            <th style="width:3%">#</th>
            <th style="width:30%">질문</th>
            <th style="width:37%">모범 답변</th>
            <th style="width:8%">난이도</th>
            <th style="width:10%">카테고리</th>
            <th style="width:12%">출처</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="qa, stat : ${persona.questions()}">
            <td th:text="${stat.count}">1</td>
            <td th:text="${qa.question()}">질문 내용</td>
            <td style="white-space: pre-line" th:text="${qa.answer()}">모범 답변</td>
            <td>
                <span class="difficulty"
                      th:classappend="${qa.difficulty() == '상'} ? 'difficulty-high' : (${qa.difficulty() == '하'} ? 'difficulty-low' : 'difficulty-mid')"
                      th:text="${qa.difficulty()}">중</span>
            </td>
            <td><span class="category-badge" th:text="${qa.category()}">일반</span></td>
            <td>
                <div class="sources" th:if="${qa.sources() != null and !qa.sources().isEmpty()}">
                    <span th:each="src : ${qa.sources()}" th:utext="${src}">출처</span>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="footer">
    <p>AI 기반 예상 질의서 — 자동 생성된 문서이며 검토가 필요합니다.</p>
</div>

</body>
</html>
